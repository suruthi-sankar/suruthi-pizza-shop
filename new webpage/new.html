<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="web.css">
</head>
<body>
    <div id="splash">
        <img src="image.png" class="img">
        <h1>welcome to suruthi pizza shop</h1>
        <button onclick="enterpizza()">enter pizza</button>
    </div>
    <div id="main-content">
  <h1><b><center>ss pizza</center></b></h1> 
  <nav>
    <button onclick="showpage('menu-section')">menu</button>
     <button onclick="showpage('snacks')">snacks</button>
      <button onclick="showpage('abouts-us')">abouts</button>
  </nav>
  <section id="menu-section" class="page" style="display: none;">
  <img src="pizzalogo.png">
  <div class="suruthi">
    <div class="card">
        <img src="cheese pizza.png">
        <h3>cheese pizza</h3>
        <p>$350</p>
        <button onclick="addToBill(350);ordersuccess();">order now</button>
    </div>
    <div class="card">
        <img src="chicken pizza.png">
        <h3>chicken pizza</h3>
        <p>$400</p>
        <button onclick="ordersuccess()">order now</button>
    </div>
     <div class="card">
        <img src="burger pizza.png">
        <h3>burger pizza</h3>
        <p>$500</p>
        <button onclick="ordersuccess()">order now</button>
    </div>
     <div class="card">
        <img src="mushroom pizza.png">
        <h3>mushroom pizza</h3>
        <p>$600</p>
        <button onclick="ordersuccess()">order now</button>
    </div>
     <div class="card">
        <img src="simple pizza.png">
        <h3>simple pizza</h3>
        <p>$150</p>
        <button onclick="ordersuccess()">order now</button>
    </div>
     <div class="card">
        <img src="veg cheese pizze.png">
        <h3>veg cheese pizza</h3>
        <p>$650</p>
        <button onclick="ordersuccess()">order now</button>
    </div>
     <div class="card">
        <img src="veg pizza.png">
        <h3>veg pizza</h3>
        <p>$200</p>
        <button onclick="ordersuccess()">order now</button>
    </div> 
  </div>
  </section>
  <section id="snacks" class="page" style="display: none;">
   <div class="gopal">
    <div class="card">
        <img src="burger.png">
        <h3>burger</h3>
        <p>$400</p>
        <button onclick="ordersuccess()">order now</button>
    </div>
    <div class="card">
        <img src="french fries.png">
        <h3>french fries</h3>
        <p>$100</p>
        <button onclick="ordersuccess()">order now</button>
    </div>
    </div>
    </section>
    <section id="abouts-us" class="page" style="display: none;">
        <h3>abouts us</h3>
    </section>
    </div>
    <script>

       function enterpizza(){
         document.getElementById("splash").style.display="none";

 document.getElementById("main-content").style.display="block";
       }
       let total=0;
       function addToBill(price){
        total +=price;
        ordersuccess();
       }
        function ordersuccess(){
            alert("ordersuccess!\ntotalbill=$"+total);
        } 
        function showpage(pageId){
            document.getElementById("menu-section").style.display="none";
 document.getElementById("snacks").style.display="none";
  document.getElementById("abouts-us").style.display="none";

   document.getElementById(pageId).style.display="block";
        }
    </script>
</body>
</html>
